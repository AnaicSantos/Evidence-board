<!DOCTYPE html>
<html>
<head>
    <title>Evidence Board</title>
</head>
<body>

<h1>Evidence Board</h1>

<button onclick="addNode()">Adicionar Nó</button>
<button onclick="connectNodes()">Ligar Nós</button>
<button onclick="removeNode()">Remover Nó</button>
<button onclick="editNode()">Editar Nó</button>

<ul id="nodeList"></ul>

<h2>Ligações</h2>
<ul id="edgeList"></ul>

<script src="./graph.js"></script>

<script>
    let graph;

    window.onload = function () {
        graph = new Graph();
        loadGraph();
    };

    function addNode() {
        const name = prompt("Nome do nó:");

        if (name) {

            if (graph.nodes[name]) {
                alert("Esse nó já existe!");
                return;
            }

            graph.addNode(name);
            updateList();
            saveGraph();
        }
    }

    function connectNodes() {
        const node1 = prompt("Primeiro nó:");
        const node2 = prompt("Segundo nó:");

        if (node1 && node2) {

            if (!graph.nodes[node1] || !graph.nodes[node2]) {
                alert("Um dos nós não existe!");
                return;
            }

            if (node1 === node2) {
                alert("Não podes ligar um nó a ele próprio!");
                return;
            }

            graph.addEdge(node1, node2);
            updateEdges();
            saveGraph();
        }
    }

    function updateList() {
        const list = document.getElementById("nodeList");
        list.innerHTML = "";

        for (let node in graph.nodes) {
            const li = document.createElement("li");
            li.textContent = node;
            list.appendChild(li);
        }
    }

    function updateEdges() {
        const list = document.getElementById("edgeList");
        list.innerHTML = "";

        for (let node in graph.nodes) {
            for (let connection of graph.nodes[node]) {
                const li = document.createElement("li");
                li.textContent = node + " -> " + connection;
                list.appendChild(li);
            }
        }
    }

    function saveGraph() {
        localStorage.setItem("graph", JSON.stringify(graph.nodes));
    }

    function loadGraph() {
        const data = localStorage.getItem("graph");

        if (data) {
            graph.nodes = JSON.parse(data);
            updateList();
            updateEdges();
        }
    }

    function removeNode() {
        const node = prompt("Nome do nó a remover:");

        if (node && graph.nodes[node]) {

            for (let n in graph.nodes) {
                graph.nodes[n] = graph.nodes[n].filter(connection => connection !== node);
            }

            delete graph.nodes[node];

            updateList();
            updateEdges();
            saveGraph();
        }
    }

    function editNode() {
        const oldName = prompt("Nome atual do nó:");
        const newName = prompt("Novo nome do nó:");

        if (oldName && newName && graph.nodes[oldName]) {

            if (graph.nodes[newName]) {
                alert("Já existe um nó com esse nome!");
                return;
            }

            graph.nodes[newName] = graph.nodes[oldName];
            delete graph.nodes[oldName];

            for (let node in graph.nodes) {
                graph.nodes[node] = graph.nodes[node].map(connection =>
                    connection === oldName ? newName : connection
                );
            }

            updateList();
            updateEdges();
            saveGraph();
        }
    }
</script>

</body>
</html>
